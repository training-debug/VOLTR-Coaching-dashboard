<script>
(function(){
  var HASH="55dfec190b3f6eea9dd328f0dd325d7f5889d44081b0663d4f5f348e26ecf5ef";
  function reveal(){ var g=document.getElementById('voltr-gate'); if(g) g.remove(); }
  if(sessionStorage.getItem('voltr_auth')==='1'){ reveal(); return; }
  async function check(){
    var pw=document.getElementById('voltr-pw').value;
    var buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    if(hex===HASH){ sessionStorage.setItem('voltr_auth','1'); reveal(); }
    else { document.getElementById('voltr-err').textContent='Falsches Passwort'; document.getElementById('voltr-pw').value=''; }
  }
  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('voltr-go').addEventListener('click',check);
    document.getElementById('voltr-pw').addEventListener('keydown',function(e){ if(e.key==='Enter') check(); });
    document.getElementById('voltr-pw').focus();
  });
})();
</script>

const DATA_VERSION = '2026-06-09-01'; // Vom Agent bei jedem Sync hochgezaehlt. Aenderung => Datei-Daten gewinnen.
function loadData() {
  const raw = localStorage.getItem(LS_KEY);
  const storedV = localStorage.getItem(LS_KEY + '_v');
  if (raw && storedV === DATA_VERSION) { try { data = JSON.parse(raw); return; } catch(e) {} }
  // Neue Version in der Datei (oder erster Aufruf) => frische BASELINE laden.
  data = JSON.parse(JSON.stringify(BASELINE));
  saveData();
}

function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(data)); localStorage.setItem(LS_KEY + '_v', DATA_VERSION); }

function sortByD(arr) { arr.sort((a, b) => a.d.localeCompare(b.d)); }

function destroyCharts() {
  chartInstances.forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = [];
}

function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }

function cutoffDate(range) {
  const d = new Date(TODAY);
  if (range === '4w') d.setDate(d.getDate() - 28);
  else if (range === '3m') d.setMonth(d.getMonth() - 3);
  else if (range === '1y') d.setFullYear(d.getFullYear() - 1);
  else return null;
  return d.toISOString().slice(0, 10);
}

function filterRange(arr, range) {
  const cut = cutoffDate(range);
  return cut ? arr.filter(e => e.d >= cut) : arr;
}

function calcTrend(daily) {
  const w = daily.filter(e => e.w != null);
  if (w.length < 2) return null;
  const last = w[w.length - 1].w;
  const n = Math.min(7, w.length - 1);
  const prev = w.slice(-(n + 1), -1).reduce((s, e) => s + e.w, 0) / n;
  return last - prev;
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function fmtNum(n) { return n != null ? n.toLocaleString('de-DE') : '-'; }

function sortedClientNames() {
  return Object.keys(data).sort((a, b) => {
    const sa = data[a].status === 'Aktiv' ? 0 : 1;
    const sb = data[b].status === 'Aktiv' ? 0 : 1;
    if (sa !== sb) return sa - sb;
    return a.localeCompare(b);
  });
}

// ── Tab bar ──
function renderTabs() {
  const names = sortedClientNames();
  let h = `<button class="tab ${currentTab === '__overview__' ? 'active' : ''}" onclick="switchTab('__overview__')">Ubersicht</button>`;
  for (const n of names) {
    const c = data[n];
    const dot = c.status === 'Aktiv' ? 'dot-green' : 'dot-gray';
    h += `<button class="tab ${currentTab === n ? 'active' : ''}" onclick="switchTab('${esc(n)}')"><span class="status-dot ${dot}"></span>${n.split(' ')[0]}</button>`;
  }
  document.getElementById('tabBar').innerHTML = h;
}

function switchTab(name) {
  currentTab = name;
  currentRange = 'all';
  destroyCharts();
  renderTabs();
  render();
}

function setRange(r) {
  currentRange = r;
  destroyCharts();
  render();
}

function rangeBar() {
  const rs = [['4w','4 Wochen'],['3m','3 Monate'],['1y','1 Jahr'],['all','Gesamt']];
  return '<div class="time-range">' + rs.map(([k,l]) =>
    `<button class="${currentRange === k ? 'active' : ''}" onclick="setRange('${k}')">${l}</button>`
  ).join('') + '</div>';
}

  const dm = s => s ? (s.slice(8,10)+'.'+s.slice(5,7)+'.') : '';
  function srcOf(n,c){ if(n==='Kerstin Perl'||n==='Aymeric Echterhoff') return 'WhatsApp'; return c.isRunner ? 'TrainingPeaks' : 'movement'; }
  function train7(c){ let cnt=0,last=null; (c.sessions||[]).forEach(s=>{ if(s.d>=WIN){cnt++; if(!last||s.d>last)last=s.d;} }); (c.workouts||[]).forEach(w=>{ if(w.d>=WIN){cnt++; if(!last||w.d>last)last=w.d;} }); return {cnt,last}; }

  if (c.isRunner) {
    // KM chart
    const wkm = filterRange(c.weekly_km || [], currentRange);
    const wkmRev = [...wkm].reverse();
    let wkmRows = '';
    for (const e of wkmRev) {
      const idx = (c.weekly_km || []).indexOf(e);
      wkmRows += `<tr><td>${e.d}</td><td>${e.km} km</td><td>${e.runs}</td><td><button class="xbtn" onclick="delWkm('${esc(name)}',${idx})">&times;</button></td></tr>`;
    }

    // Races
    const races = c.races || [];
    let raceRows = '';
    for (const r of [...races].reverse()) {
      const idx = races.indexOf(r);
      raceRows += `<tr><td>${r.d}</td><td>${r.name}</td><td>${r.dist || '-'}</td><td>${r.time || '-'}</td><td>${r.note || '-'}</td><td><button class="xbtn" onclick="delRace('${esc(name)}',${idx})">&times;</button></td></tr>`;
    }

    // Sessions
    const sess = filterRange(c.sessions || [], currentRange);
    let sessRows = '';
    for (const s of [...sess].reverse()) {
      const idx = (c.sessions || []).indexOf(s);
      sessRows += `<tr><td>${s.d}</td><td>${s.type}</td><td>${s.dist} km</td><td>${s.note || '-'}</td><td><button class="xbtn" onclick="delSess('${esc(name)}',${idx})">&times;</button></td></tr>`;
    }

    runnerHTML = `
      <div class="section">
        <h3>Wochen-Kilometer</h3>
        <div class="chart-container"><canvas id="chartKm"></canvas></div>
        <div class="table-wrap">
          <table><thead><tr><th>Woche</th><th>km</th><th>Laufe</th><th></th></tr></thead>
          <tbody>${wkmRows || '<tr><td colspan="4" style="text-align:center;color:#aaa;padding:16px">Keine Daten</td></tr>'}</tbody></table>
        </div>
      </div>

      <div class="section">
        <h3>Wettkampfe</h3>
        <div class="table-wrap">
          <table><thead><tr><th>Datum</th><th>Name</th><th>Distanz</th><th>Zeit</th><th>Notiz</th><th></th></tr></thead>
          <tbody>${raceRows || '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:16px">Keine Daten</td></tr>'}</tbody></table>
        </div>
      </div>

      <div class="section">
        <h3>Sessions</h3>
        <div class="table-wrap">
          <table><thead><tr><th>Datum</th><th>Typ</th><th>Distanz</th><th>Notiz</th><th></th></tr></thead>
          <tbody>${sessRows || '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:16px">Keine Daten</td></tr>'}</tbody></table>
        </div>
      </div>

      <div class="form-section">
        <h3>Wochen-km hinzufugen</h3>
        <div class="form-row">
          <div class="form-group"><label>Woche (Mo)</label><input type="date" id="fWkmD" class="w150"></div>
          <div class="form-group"><label>km</label><input type="number" step="0.1" id="fWkmKm" class="w80"></div>
          <div class="form-group"><label>Laufe</label><input type="number" id="fWkmR" class="w80"></div>
          <button class="primary" onclick="addWkm('${esc(name)}')">+</button>
        </div>
      </div>

      <div class="form-section">
        <h3>Session hinzufugen</h3>
        <div class="form-row">
          <div class="form-group"><label>Datum</label><input type="date" id="fSessD" class="w150"></div>
          <div class="form-group"><label>Typ</label>
            <select id="fSessT" class="w120">
              <option>Easy Run</option><option>Long Run</option><option>Tempo</option>
              <option>Intervall</option><option>Trail</option><option>Quality</option><option>Wettkampf</option>
            </select>
          </div>
          <div class="form-group"><label>km</label><input type="number" step="0.1" id="fSessDist" class="w80"></div>
          <div class="form-group"><label>Notiz</label><input type="text" id="fSessNote" class="w150"></div>
          <button class="primary" onclick="addSess('${esc(name)}')">+</button>
        </div>
      </div>

      <div class="form-section">
        <h3>Wettkampf hinzufugen</h3>
        <div class="form-row">
          <div class="form-group"><label>Datum</label><input type="date" id="fRaceD" class="w150"></div>
          <div class="form-group"><label>Name</label><input type="text" id="fRaceN" class="w150"></div>
          <div class="form-group"><label>Distanz</label><input type="text" id="fRaceDist" class="w100"></div>
          <div class="form-group"><label>Zeit</label><input type="text" id="fRaceTime" class="w100" placeholder="h:mm:ss"></div>
          <div class="form-group"><label>Notiz</label><input type="text" id="fRaceNote" class="w150"></div>
          <button class="primary" onclick="addRace('${esc(name)}')">+</button>
        </div>
      </div>`;
  }

  let gymHTML = '';
  if ((c.workouts || []).length) {
    let aRows = '';
    for (const a of [...c.workouts].reverse()) {
      aRows += `<tr><td>${a.d}</td><td>${a.feel || '-'}</td><td>${a.note || '-'}</td></tr>`;
    }
    gymHTML = `<div class="section"><h3>Absolvierte Einheiten</h3><div class="table-wrap"><table><thead><tr><th>Datum</th><th>Gef&uuml;hl</th><th>Notiz</th></tr></thead><tbody>${aRows}</tbody></table></div></div>`;
  }
  el.innerHTML = `
    <div class="section">
      <h3>Gewichtsverlauf</h3>
      ${rangeBar()}
      <div class="chart-container"><canvas id="chartWeight"></canvas></div>
    </div>
    <div class="cards">${cards}</div>
    ${gymHTML}
    ${runnerHTML}
    <div class="section">
      <h3>Tagliche Daten</h3>
      <div class="table-wrap">
        <table><thead><tr>${thDaily}</tr></thead><tbody>${dailyRows}</tbody></table>
      </div>
    </div>
    <div class="form-section">
      <h3>Eintrag hinzufugen</h3>
      <div class="form-row">
        ${dailyFormFields}
        <button class="primary" onclick="addDaily('${esc(name)}')">+</button>
      </div>
    </div>`;

  // Draw charts
  requestAnimationFrame(() => {
    drawWeightChart(filt);
    if (c.isRunner) drawKmChart(filterRange(c.weekly_km || [], currentRange));
  });
}

function drawWeightChart(entries) {
  const canvas = document.getElementById('chartWeight');
  if (!canvas) return;
  const w = entries.filter(e => e.w != null);
  if (!w.length) return;
  const ch = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: w.map(e => e.d),
      datasets: [{
        data: w.map(e => e.w),
        borderColor: '#111', backgroundColor: 'rgba(0,0,0,0.04)',
        fill: true, tension: 0.3, pointRadius: w.length > 40 ? 1 : 3,
        pointHoverRadius: 5, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { font: { size: 10 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
  chartInstances.push(ch);
}

function drawKmChart(entries) {
  const canvas = document.getElementById('chartKm');
  if (!canvas || !entries.length) return;
  const ch = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: entries.map(e => e.d),
      datasets: [{
        data: entries.map(e => e.km),
        backgroundColor: '#111', borderRadius: 3, maxBarThickness: 28
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { font: { size: 10 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
  chartInstances.push(ch);
}

// ── Data mutations ──
function addDaily(name) {
  const d = document.getElementById('fDate').value;
  if (!d) { alert('Datum fehlt'); return; }
  const wVal = document.getElementById('fWeight').value;
  const entry = { d, w: wVal ? parseFloat(wVal) : null };
  const calEl = document.getElementById('fCal');
  const protEl = document.getElementById('fProt');
  const stepsEl = document.getElementById('fSteps');
  const rhrEl = document.getElementById('fRHR');
  const hrmaxEl = document.getElementById('fHRMax');
  if (calEl && calEl.value) entry.cal = parseInt(calEl.value);
  if (protEl && protEl.value) entry.prot = parseInt(protEl.value);
  if (stepsEl && stepsEl.value) entry.steps = parseInt(stepsEl.value);
  if (rhrEl && rhrEl.value) entry.rhr = parseInt(rhrEl.value);
  if (hrmaxEl && hrmaxEl.value) entry.hrmax = parseInt(hrmaxEl.value);
  if (!data[name].daily) data[name].daily = [];
  data[name].daily = data[name].daily.filter(e => e.d !== d);
  data[name].daily.push(entry);
  sortByD(data[name].daily);
  saveData(); destroyCharts(); render();
}

function delDaily(name, idx) {
  data[name].daily.splice(idx, 1);
  saveData(); destroyCharts(); render();
}

function addWkm(name) {
  const d = document.getElementById('fWkmD').value;
  const km = document.getElementById('fWkmKm').value;
  if (!d || !km) { alert('Datum und km sind Pflicht'); return; }
  if (!data[name].weekly_km) data[name].weekly_km = [];
  data[name].weekly_km = data[name].weekly_km.filter(e => e.d !== d);
  const r = document.getElementById('fWkmR').value;
  data[name].weekly_km.push({ d, km: parseFloat(km), runs: r ? parseInt(r) : 0 });
  sortByD(data[name].weekly_km);
  saveData(); destroyCharts(); render();
}

function delWkm(name, idx) {
  (data[name].weekly_km || []).splice(idx, 1);
  saveData(); destroyCharts(); render();
}

function addSess(name) {
  const d = document.getElementById('fSessD').value;
  const dist = document.getElementById('fSessDist').value;
  if (!d || !dist) { alert('Datum und Distanz sind Pflicht'); return; }
  if (!data[name].sessions) data[name].sessions = [];
  const entry = { d, type: document.getElementById('fSessT').value, dist: parseFloat(dist) };
  const note = document.getElementById('fSessNote').value;
  if (note) entry.note = note;
  data[name].sessions.push(entry);
  sortByD(data[name].sessions);
  saveData(); destroyCharts(); render();
}

function delSess(name, idx) {
  (data[name].sessions || []).splice(idx, 1);
  saveData(); destroyCharts(); render();
}

function addRace(name) {
  const d = document.getElementById('fRaceD').value;
  const n = document.getElementById('fRaceN').value;
  if (!d || !n) { alert('Datum und Name sind Pflicht'); return; }
  if (!data[name].races) data[name].races = [];
  const entry = { d, name: n };
  const dist = document.getElementById('fRaceDist').value;
  const time = document.getElementById('fRaceTime').value;
  const note = document.getElementById('fRaceNote').value;
  if (dist) entry.dist = dist;
  if (time) entry.time = time;
  if (note) entry.note = note;
  data[name].races.push(entry);
  sortByD(data[name].races);
  saveData(); destroyCharts(); render();
}

function delRace(name, idx) {
  (data[name].races || []).splice(idx, 1);
  saveData(); destroyCharts(); render();
}

// ── Export / Import / Reset ──
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'voltr-coaching-' + TODAY + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const obj = JSON.parse(e.target.result);
      if (typeof obj !== 'object' || Array.isArray(obj)) throw new Error();
      data = obj;
      saveData(); currentTab = '__overview__';
      destroyCharts(); renderTabs(); render();
      alert('Import erfolgreich!');
    } catch(err) { alert('Fehler: Ungultige JSON-Datei'); }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

function resetData() {
  if (!confirm('Alle Daten auf Baseline zurucksetzen? Alle Anderungen gehen verloren.')) return;
  data = JSON.parse(JSON.stringify(BASELINE));
  saveData(); currentTab = '__overview__';
  destroyCharts(); renderTabs(); render();
}

// ── Init ──
(function(){var d=DATA_VERSION.slice(0,10);var el=document.getElementById('lastSync');if(el)el.textContent='Zuletzt synchronisiert: '+d;})();
loadData();
renderTabs();
render();
</script>
